name: flutter_ui
description: WebGL Shader + Liquid/Metal Button demo in Flutter

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  shared_preferences: ^2.3.2
  fl_chart: ^0.66.0
  intl: ^0.19.0
  file_picker: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  shaders:
    - assets/shaders/web_gl_shader.frag
