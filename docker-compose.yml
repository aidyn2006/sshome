services:
  db:
    image: postgres:16-alpine
    container_name: sshome-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: iot_control
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d iot_control"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: sshome-backend
    restart: unless-stopped
    environment:
      APP_NAME: SSHome IoT Control System
      ENVIRONMENT: docker
      API_V1_PREFIX: /api/v1
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/iot_control
      DATABASE_ECHO: "false"
      AUTH_MODE: jwt
      AUTH_JWT_SECRET_KEY: super-secret-key
      AUTH_JWT_ALGORITHM: HS256
      AUTH_JWT_OWNER_ID_CLAIM: owner_id
      AUTH_JWT_SUBJECT_CLAIM: sub
      AUTH_JWT_TOKEN_TYPE_CLAIM: type
      AUTH_JWT_ACCESS_TOKEN_TYPE: access
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  postgres_data:
