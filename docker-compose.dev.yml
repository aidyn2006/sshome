services:
  backend:
    volumes:
      - ./backend/app:/app/app
      - ./manufactured_devices.json:/app/manufactured_devices.json
      - ./manufactured_secrets.txt:/app/manufactured_secrets.txt
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend/mobile
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend/mobile:/app
      - /app/node_modules
    ports:
      - "19006:19006"
    environment:
      EXPO_PUBLIC_API_BASE_URL: http://localhost:8888
      CI: "false"
