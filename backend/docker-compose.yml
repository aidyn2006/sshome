version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sshome-postgres
    environment:
      POSTGRES_DB: sshome
      POSTGRES_USER: sshome
      POSTGRES_PASSWORD: sshome123
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sshome -d sshome"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
