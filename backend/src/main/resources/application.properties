spring.application.name=backend
server.port=8083

# ─── Database ───────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5436/sshome
spring.datasource.username=sshome
spring.datasource.password=sshome123
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── Connection Pool ────────────────────────────────────────────────────────
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.initialization-fail-timeout=30000

# ─── JPA / Hibernate ────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ─── JWT ────────────────────────────────────────────────────────────────────
# Base64-encoded secret (>= 256 bits)
app.jwt.secret=c3Nob21lLXN1cGVyLXNlY3JldC1qd3Qtc2lnbmluZy1rZXktMjAyNi1hdC1sZWFzdC0yNTYtYml0cw==
# 24 hours in milliseconds
app.jwt.expiration=86400000

# ─── Rate Limiting ──────────────────────────────────────────────────────────
app.rate-limit.login.capacity=5
app.rate-limit.login.refill-minutes=1
app.rate-limit.register.capacity=10
app.rate-limit.register.refill-hours=1
